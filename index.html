<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Paletas</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <main class="aplicacion">
    
    <header class="encabezado">
      <h1>Generador de Paletas de Colores</h1>
      <h2>Los colores son generados aleatoriamente en formato HSL o HEX</h2>
      <p>Clickear la checkbox para seleccionar formato:</p>
      <label class="interruptor-formato">
      <input type="checkbox" id="interruptorFormato">
      <span id="formatoLabel">Usando HSL</span>
      </label>
    </header>

    <section class="panel-controles">
      <label for="tamanoPaleta">Tamaño de la paleta:</label>
      <select id="tamanoPaleta">
        <option value="" disabled selected> Selecciona una opción...</option>
        <option value="6">6</option>
        <option value="8">8</option>
        <option value="9">9</option>
      </select>

      <button id="botonGenerar">Generar paleta</button>
    </section>

    <section id="contenedorPaleta" aria-live="polite"></section>

  </main>

  <script src="./JS/script.js"></script>
</body>
</html>
